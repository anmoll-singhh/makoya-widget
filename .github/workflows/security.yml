name: Security

# Free, industry-grade security scanning. Runs on every push to main and every PR.
# All three scanners below run on GitHub-hosted runners only (they are NOT part of
# the local `npm run ci`):
#   - Gitleaks  : secret scanning (committed credentials/tokens)
#   - Semgrep   : SAST over JS/TS/React rule packs (OSS, no token required)
#   - CodeQL    : GitHub's deep SAST for javascript-typescript
#
# The first three require no paid plan or secret to be configured:
#   - gitleaks-action runs without GITLEAKS_LICENSE for public/OSS-tier scanning.
#   - `semgrep ci` falls back to local OSS rules when SEMGREP_APP_TOKEN is unset.
#   - CodeQL uses the built-in GITHUB_TOKEN (Actions: read, security-events: write).
#
# A fourth, AI-based reviewer runs on pull requests only:
#   - Claude Code Security Review (anthropics/claude-code-security-review) — does a
#     SEMANTIC, diff-aware review of the PR and posts contextual findings as PR
#     comments. It catches logic-level issues the pattern scanners above miss
#     (e.g. RLS/tenant-isolation bugs, auth gaps, unsafe webhook handling). It is
#     the only job here that needs a secret: CLAUDE_API_KEY (a key enabled for both
#     the Claude API and Claude Code). The job is written to SKIP cleanly when that
#     secret is absent, so this workflow is safe to merge before the key is set —
#     it activates automatically once CLAUDE_API_KEY is added to repo secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Secret scanning — fails the build if a credential is committed.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits on PRs
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE intentionally omitted — not required for OSS-tier use.

  # ---------------------------------------------------------------------------
  # Semgrep OSS SAST — runs the default + typescript + react community rule packs.
  # `semgrep ci` exits non-zero on findings of blocking severity, hard-failing
  # the job. No SEMGREP_APP_TOKEN needed (OSS local rules).
  # ---------------------------------------------------------------------------
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep ci --config p/default --config p/typescript --config p/react
        env:
          # Unset token => OSS mode. Define SEMGREP_APP_TOKEN as a repo secret
          # later to also upload findings to Semgrep Cloud (optional).
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ---------------------------------------------------------------------------
  # CodeQL — GitHub-native SAST. Results land in the repo Security tab.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Claude Code Security Review — AI/semantic SAST on the PR diff.
  # Complements (does not replace) the pattern scanners above: it reasons about
  # intent, so it's well-suited to this app's risk surface (Supabase RLS / tenant
  # isolation, auth gating, the service-role-only `leads` table, Stripe webhook
  # verification). PR-only, since it reviews the diff and comments on the PR.
  #
  # Gated on CLAUDE_API_KEY: the env is hoisted to job level, and the step's `if`
  # skips the action entirely when the secret is empty. => No noisy red X on PRs
  # (or from forks) before the key is configured; flips on automatically after.
  # ---------------------------------------------------------------------------
  claude-review:
    name: Claude Code Security Review (AI)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write # post review findings as PR comments
      contents: read
    env:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2 # diff the PR head against its base
      - name: Claude security review
        if: env.CLAUDE_API_KEY != ''
        uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
