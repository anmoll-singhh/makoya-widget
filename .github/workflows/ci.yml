name: CI

# Gate every push and PR on: shared-config sync, typecheck (web + widget), unit tests.
# This is intentionally lightweight (no browser/scanner run) so it stays fast and
# requires no secrets. The scanner is exercised manually / in a later integration job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Verify shared mirror is in sync
        # Regenerates the mirror; if it changes, the working tree is dirty -> fail.
        run: |
          npm run sync:shared
          if ! git diff --quiet -- apps/web/lib/shared/index.ts; then
            echo "::error::apps/web/lib/shared mirror is out of sync. Run 'npm run sync:shared' and commit."
            git --no-pager diff -- apps/web/lib/shared/index.ts
            exit 1
          fi

      - name: Typecheck (web + widget)
        run: npm run typecheck

      - name: Lint (non-blocking on legacy)
        # ESLint is intentionally NON-BLOCKING: the flat config downgrades noisy
        # legacy rules to warnings, and `lint` (= `eslint .`) exits 0 on warnings.
        # To make it blocking once the codebase is clean, switch to
        # `npm run lint:strict -w @makoya/web` (eslint . --max-warnings=0).
        run: npm run lint -w @makoya/web

      - name: Format check (report-only)
        # Legacy code is not yet Prettier-formatted, so a hard --check would mass-
        # fail. `|| true` keeps this informational. Drop `|| true` after running
        # `npm run format -w @makoya/web` once and committing the result.
        run: npm run format:check -w @makoya/web || true

      - name: Unit tests + coverage
        # Coverage thresholds (vitest.config.ts) are a regression floor set just
        # below current numbers: passes today, fails if coverage drops.
        run: npm run test:coverage -w @makoya/web

      - name: Dependency audit (warn-only)
        # `npm audit` is reported but does NOT hard-fail the build. Legacy
        # transitive advisories (often in build-only tooling with no fix path)
        # would otherwise block every PR. Review the output and bump deps via
        # the Dependabot PRs. Tighten to a hard gate by removing `|| true` once
        # the high/critical advisory backlog is cleared.
        run: npm audit --audit-level=high || true
