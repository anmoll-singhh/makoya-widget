<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Makoya — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{--ink:#0D1B4D;--accent:#1E63FF;--accent-d:#1A4FD0;--t1:#0F1116;--t2:#586079;--t3:#9aa2b6;--line:#e4e8f0;--bg:#F2F4F7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi','Inter',system-ui,sans-serif;min-height:100vh;background:#06102e;color:var(--t1);
 background-image:url('makoya_brand_splash.png');background-size:cover;background-position:right center;-webkit-font-smoothing:antialiased}
.stage{min-height:100vh;display:flex;align-items:center;padding:0 7vw}
.card{width:430px;background:#fff;border-radius:20px;padding:38px 38px 30px;box-shadow:0 30px 80px rgba(3,8,28,.45);border:1px solid rgba(255,255,255,.6)}
.brand{display:flex;align-items:center;gap:10px;font-family:'Satoshi';font-weight:700;font-size:20px;color:var(--ink);margin-bottom:30px}
h1{font-family:'Satoshi';font-weight:700;font-size:27px;letter-spacing:-.02em;color:var(--ink)}
.sub{color:var(--t2);font-size:14px;margin:6px 0 26px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--t1);margin:0 0 7px}
.field{position:relative;margin-bottom:16px}
.field i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:18px}
.field .eye{left:auto;right:13px;cursor:pointer}
input{width:100%;height:46px;border:1px solid var(--line);border-radius:11px;padding:0 14px 0 40px;font-size:14px;font-family:inherit;color:var(--t1);background:#fbfcfe;outline:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,99,255,.14);background:#fff}
.rowb{display:flex;align-items:center;justify-content:space-between;margin:2px 0 22px;font-size:13px}
.rowb label{display:flex;align-items:center;gap:7px;font-weight:500;color:var(--t2);margin:0}
.rowb a{color:var(--accent-d);font-weight:600;text-decoration:none}
.btn{width:100%;height:47px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--accent-d)}
.div{display:flex;align-items:center;gap:14px;color:var(--t3);font-size:12px;margin:20px 0}
.div::before,.div::after{content:"";flex:1;height:1px;background:var(--line)}
.sso{width:100%;height:46px;border:1px solid var(--line);border-radius:11px;background:#fff;font-size:14px;font-weight:600;font-family:inherit;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.sso:hover{background:var(--bg)}
.foot{text-align:center;font-size:13px;color:var(--t2);margin-top:22px}
.foot a{color:var(--accent-d);font-weight:600;text-decoration:none}
.tag{position:fixed;right:5vw;bottom:5vh;color:rgba(255,255,255,.82);font-size:13px;font-weight:500;letter-spacing:.16em;text-transform:uppercase}
.trust{display:flex;align-items:center;gap:7px;justify-content:center;margin-top:16px;color:var(--t3);font-size:11.5px}
</style>
</head>
<body>
<div class="stage">
  <div class="card">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M16 2.5L27.7 9.2L27.7 22.8L16 29.5L4.3 22.8L4.3 9.2Z" stroke="#0D1B4D" stroke-width="2"/>
        <path d="M14 11L9 16L14 21" stroke="#0D1B4D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18 11L23 16L18 21" stroke="#1E63FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg> Makoya
    </div>
    <h1>Welcome back</h1>
    <div class="sub">Sign in to manage your sites, audits and reports.</div>

    <label>Work email</label>
    <div class="field"><i class="ti ti-mail"></i><input type="email" value="creativesgpt@wavesmvmnt.com"></div>

    <label>Password</label>
    <div class="field"><i class="ti ti-lock"></i><input type="password" value="••••••••••"><i class="ti ti-eye eye"></i></div>

    <div class="rowb">
      <label><input type="checkbox" checked style="width:auto;height:auto;padding:0"> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn">Sign in <i class="ti ti-arrow-right" style="font-size:18px"></i></button>
    <div class="div">or</div>
    <button class="sso"><i class="ti ti-brand-google" style="font-size:18px"></i> Continue with Google</button>

    <div class="foot">New to Makoya? <a href="#">Start free →</a></div>
    <div class="trust"><i class="ti ti-shield-check" style="font-size:14px"></i> SOC 2 · GDPR-ready · WCAG-built</div>
  </div>
</div>
<div class="tag">Built on trust. Driven by integrity.</div>
</body>
</html>
